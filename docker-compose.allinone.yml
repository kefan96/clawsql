# ClawSQL All-in-One Deployment
# A single container with all components + OpenClaw AI gateway
#
# Usage:
#   docker-compose -f docker-compose.allinone.yml up -d
#
# This is the simplest deployment option - ClawSQL all-in-one + OpenClaw.

services:
  # =============================================================================
  # OpenClaw - AI Agent Gateway for intelligent operations
  # =============================================================================
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    hostname: openclaw
    ports:
      - "18789:18789"  # Gateway WebSocket port
      - "18790:18790"  # Control UI port
    # Note: Named volumes may have permission issues if container runs as non-root.
    # The entrypoint.sh handles this by falling back to user-writeable directories.
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-clawsql-openclaw-token}
      - OPENCLAW_STATE_DIR=/data/.openclaw
      - OPENCLAW_WORKSPACE_DIR=/data/workspace
    volumes:
      - openclaw-data:/data
      - ./openclaw/entrypoint.sh:/entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:18789/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # =============================================================================
  # ClawSQL All-in-One (Node.js + Orchestrator + ProxySQL + Prometheus + Grafana)
  # =============================================================================
  clawsql-allinone:
    image: kefan96/clawsql:allinone
    build:
      context: .
      dockerfile: docker/Dockerfile.allinone
    container_name: clawsql
    hostname: clawsql
    privileged: true
    ports:
      - "8080:8080"   # ClawSQL API
      - "3000:3000"   # Orchestrator
      - "6032:6032"   # ProxySQL Admin
      - "6033:6033"   # ProxySQL MySQL
      - "9090:9090"   # Prometheus
      - "3001:3001"   # Grafana
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - API_TOKEN_SECRET=${API_TOKEN_SECRET:-change-me-in-production}
      - ORCHESTRATOR_URL=http://localhost:3000
      - PROXYSQL_HOST=localhost
      - PROXYSQL_ADMIN_PORT=6032
      - PROMETHEUS_URL=http://localhost:9090
      # OpenClaw Gateway for AI operations
      - OPENCLAW_GATEWAY_URL=ws://host.docker.internal:18789
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-clawsql-openclaw-token}
      # Metadata Database (optional - uses internal SQLite if not set)
      - METADATA_DB_HOST=${METADATA_DB_HOST:-}
      - METADATA_DB_PORT=${METADATA_DB_PORT:-3306}
      - METADATA_DB_NAME=${METADATA_DB_NAME:-clawsql_meta}
      - METADATA_DB_USER=${METADATA_DB_USER:-clawsql}
      - METADATA_DB_PASSWORD=${METADATA_DB_PASSWORD:-clawsql_password}
      # MySQL credentials
      - MYSQL_ADMIN_USER=${MYSQL_ADMIN_USER:-clawsql}
      - MYSQL_ADMIN_PASSWORD=${MYSQL_ADMIN_PASSWORD:-clawsql_password}
      - MYSQL_REPLICATION_USER=${MYSQL_REPLICATION_USER:-repl}
      - MYSQL_REPLICATION_PASSWORD=${MYSQL_REPLICATION_PASSWORD:-repl_password}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # Failover
      - AUTO_FAILOVER_ENABLED=${AUTO_FAILOVER_ENABLED:-true}
    volumes:
      - clawsql-data:/data
      - prometheus-data:/var/lib/prometheus
      - grafana-data:/var/lib/grafana
      - proxysql-data:/var/lib/proxysql
    depends_on:
      - openclaw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  clawsql-data:
  prometheus-data:
  grafana-data:
  proxysql-data:
  openclaw-data: