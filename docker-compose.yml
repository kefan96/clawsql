# ClawSQL Platform - Docker Compose
# MySQL HA management platform with Orchestrator, ProxySQL, Prometheus, and Grafana
#
# Quick Start:
#   ./start.sh              # Start platform only (use your own MySQL)
#   ./start.sh --demo       # Start with demo MySQL cluster
#
# After starting, register your MySQL instances:
#   curl -X POST http://localhost:8080/api/v1/instances \
#     -H 'Content-Type: application/json' \
#     -d '{"host": "your-mysql-host", "port": 3306}'

version: "3.8"

services:
  # =============================================================================
  # ClawSQL Application
  # =============================================================================
  clawsql:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: clawsql
    hostname: clawsql
    ports:
      - "8080:8080"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8080
      - API_TOKEN_SECRET=${API_TOKEN_SECRET:-change-me-in-production}
      - ORCHESTRATOR_URL=http://orchestrator:3000
      - PROXYSQL_HOST=proxysql
      - PROXYSQL_ADMIN_PORT=6032
      - PROMETHEUS_URL=http://prometheus:9090
      # Database for ClawSQL metadata (SQLite by default, or MySQL)
      - DB_TYPE=${DB_TYPE:-sqlite}
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-clawsql}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      # MySQL monitoring credentials (for your MySQL instances)
      - MYSQL_MONITOR_USER=${MYSQL_MONITOR_USER:-monitor}
      - MYSQL_MONITOR_PASSWORD=${MYSQL_MONITOR_PASSWORD:-}
      - MYSQL_REPLICATION_USER=${MYSQL_REPLICATION_USER:-repl}
      - MYSQL_REPLICATION_PASSWORD=${MYSQL_REPLICATION_PASSWORD:-}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      # Failover settings
      - AUTO_FAILOVER_ENABLED=${AUTO_FAILOVER_ENABLED:-true}
    depends_on:
      orchestrator:
        condition: service_started
      proxysql:
        condition: service_started
    networks:
      - clawsql-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - clawsql-data:/data

  # =============================================================================
  # Orchestrator - MySQL Topology Management
  # =============================================================================
  orchestrator:
    image: openorchestrator/orchestrator:latest
    container_name: orchestrator
    hostname: orchestrator
    ports:
      - "3000:3000"
    volumes:
      - ./docker/orchestrator/orchestrator.conf.json:/etc/orchestrator.conf.json
      - orchestrator-data:/var/lib/orchestrator
    networks:
      - clawsql-network
    restart: unless-stopped

  # =============================================================================
  # ProxySQL - MySQL Proxy with Routing
  # Starts empty - configured dynamically via ClawSQL API
  # =============================================================================
  proxysql:
    image: proxysql/proxysql:latest
    container_name: proxysql
    hostname: proxysql
    ports:
      - "6032:6032"  # Admin interface
      - "6033:6033"  # MySQL traffic
    volumes:
      - ./docker/proxysql/proxysql.cnf:/etc/proxysql.cnf
      - proxysql-data:/var/lib/proxysql
    networks:
      - clawsql-network
    restart: unless-stopped

  # =============================================================================
  # Prometheus - Metrics Collection
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - clawsql-network
    restart: unless-stopped

  # =============================================================================
  # Grafana - Visualization
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    hostname: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - clawsql-network
    restart: unless-stopped

# =============================================================================
# Networks
# =============================================================================
networks:
  clawsql-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/24

# =============================================================================
# Volumes
# =============================================================================
volumes:
  clawsql-data:
  orchestrator-data:
  proxysql-data:
  prometheus-data:
  grafana-data: